services:
  - type: web
    name: protoryde-backend
    env: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: protoryde-db
          property: connectionString
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health

databases:
  - name: protoryde-db
    databaseName: protoryde
    region: oregon
    plan: free
